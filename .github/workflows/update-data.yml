name: Update data.json

on:
  schedule:
    - cron: "15 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install packages
        run: |
          Rscript -e "install.packages(c('stringr','dplyr','lubridate','jsonlite'), repos='https://cloud.r-project.org')"

      - name: Run script
        run: Rscript update_data.R

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Auto update data.json"
          git push
