name: Update data.json

on:
  schedule:
    - cron: "25 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data-main
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: |
          Rscript -e "install.packages(c('stringr','dplyr','lubridate','jsonlite','tidyr'), repos='https://cloud.r-project.org')"

      - name: Run update script
        run: Rscript update_data.R

      - name: Write last run timestamp
        run: |
          date -u +"%Y-%m-%d %H:%M:%S UTC" > last_run_update_data.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi

          git commit -m "Automatická aktualizace dat"
          git pull --rebase origin main
          git push origin main
