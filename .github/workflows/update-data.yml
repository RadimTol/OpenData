name: Update data.json

on:
  schedule:
    # každý den v 04:15 UTC (~5:15/6:15 CET/CEST)
    - cron: "15 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: |
          Rscript -e "install.packages(c('stringr','dplyr','lubridate','jsonlite'), repos='https://cloud.r-project.org')"

      - name: Run update script
        run: Rscript update_data.R

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data.json

          if git diff --staged --quiet; then
            echo "Žádná změna v data.json"
          else
            git commit -m "Automatická aktualizace data.json"
            git push
          fi
