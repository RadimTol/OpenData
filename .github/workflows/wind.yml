name: Compute CALM from WR08

on:
  workflow_dispatch:

jobs:
  wind:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Show R version
        run: Rscript --version

      - name: Run script
        run: Rscript wind.R

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: wind_roses_WR08_calm_1991_2020
          path: wind_roses_WR08_calm_1991_2020.csv
