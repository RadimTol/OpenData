name: Compute CALM from WR08

on:
  workflow_dispatch:

jobs:
  wind:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - name: Run script
        run: Rscript wind.R

      - name: List files
        run: ls -la

      - name: Fail if result is missing
        run: test -f wind_roses_WR08_calm_1991_2020.csv

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: wind_roses_WR08_calm_1991_2020
          path: wind_roses_WR08_calm_1991_2020.csv
