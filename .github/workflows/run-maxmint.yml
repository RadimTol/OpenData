name: Run MaxMinT script

on:
  schedule:
    - cron: "25 * * 10 *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            jsonlite
            httr
            dplyr
            purrr
            stringr
            readr
            lubridate
            rvest
            xml2
            tibble

      - name: Run script
        run: Rscript MaxMinT.R

      - name: Commit and push results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git diff --cached --quiet || git commit -m "Update data from MaxMinT.R"

          git pull --rebase
          git push
