name: Run MaxMinT script

on:
  schedule:
    - cron: "10 19 * * *"   # 00:00
    - cron: "10 1 * * *"    # 03:00
    - cron: "10 3-18/2 * * *"
    
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: maxmint-main
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            jsonlite
            httr
            dplyr
            purrr
            stringr
            readr
            lubridate
            rvest
            xml2
            tibble

      - name: Run script
        run: Rscript MaxMinT.R

      - name: Show outputs (debug)
        run: |
          ls -la
          find . -maxdepth 2 -type f -name "*.csv"

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # hlavní výstup
          git add MaxMinT.csv

          # seznam zpracovaných souborů
          if [ -f listnow.csv ]; then
            git add listnow.csv
          fi

          # případná debug data
          if [ -f datanow.csv ]; then
            git add datanow.csv
          fi

          # pokud není změna → OK konec
          git diff --cached --quiet && exit 0

          git commit -m "Update MaxMinT outputs"

          git pull --rebase origin main
          git push origin main
