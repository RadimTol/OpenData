

name: Run MaxMinTvcera script

on:
  schedule:
    - cron: "20 1,13 * * *"
  workflow_dispatch:

jobs:
  run-r-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libicu-dev

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("jsonlite", "httr", "dplyr", "purrr", "stringr", "readr", "lubridate", "rvest", "xml2", "tibble"), repos = "https://cloud.r-project.org")'
        
      - name: Run MaxMinTvcera.R
        run: |
          Rscript MaxMinTvcera.R

      - name: Commit and push results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git diff --cached --quiet || git commit -m "Update data from MaxMinT.R"

          git pull --rebase
          git push
