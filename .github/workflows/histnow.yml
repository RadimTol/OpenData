name: Run histnow

on:
  schedule:
    - cron: "20 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: histnow-main
  cancel-in-progress: false

jobs:
  run-histnow:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            jsonlite
            dplyr
            purrr
            stringr
            readr
            lubridate
            rvest
            xml2
            tibble

      - name: Run script
        run: Rscript histnow.R

      - name: Commit and push CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # vždy přidej hlavní výstup
          git add histnow.csv

          # přidej data pouze pokud existují
          if [ -f datanow.csv ]; then
            git add datanow.csv
          fi

          # pokud není změna, skonči OK
          git diff --cached --quiet && exit 0

          git commit -m "Update histnow.csv"
          git pull --rebase origin main
          git push origin main
