name: Run histnow

on:
  schedule:
    - cron: "25 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-histnow:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            jsonlite
            dplyr
            purrr
            stringr
            readr
            lubridate
            rvest
            xml2
            tibble

      - name: Run script
        run: Rscript histnow.R

      - name: Show output files
        run: |
          ls -la
          find . -maxdepth 2 -type f -name "*.csv"

      - name: Commit and push CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add histnow.csv
          git diff --cached --quiet || git commit -m "Update histnow.csv"
          git push
