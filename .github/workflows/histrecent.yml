name: Run histrecent

on:
  schedule:
    - cron: "10 1,13 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: histrecent-main
  cancel-in-progress: false

jobs:
  run-histrecent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libicu-dev

      - name: Install R dependencies
        shell: Rscript {0}
        run: |
          repos <- c(CRAN = "https://cloud.r-project.org")
          pkgs <- c(
            "jsonlite",
            "dplyr",
            "purrr",
            "stringr",
            "readr",
            "lubridate",
            "rvest",
            "xml2",
            "tibble"
          )
          missing <- pkgs[!vapply(pkgs, requireNamespace, logical(1), quietly = TRUE)]
          if (length(missing) > 0) {
            install.packages(missing, repos = repos, Ncpus = 2)
          }

      - name: Run script
        run: Rscript histrecent.R

      - name: Commit and push CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # vždy přidej hlavní výstup
          git add histrecent.csv

          # přidej data pouze pokud existují
          if [ -f datarecent.csv ]; then
            git add datarecent.csv
          fi

          # pokud není změna, skonči OK
          git diff --cached --quiet && exit 0

          git commit -m "Update histrecent.csv"
          git pull --rebase origin main
          git push origin main
