name: Run histrecent

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run-histrecent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            jsonlite
            dplyr
            purrr
            stringr
            readr
            lubridate
            rvest
            xml2
            tibble

      - name: Run script
        run: Rscript histrecent.R

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: histrecent
          path: histrecent.csv
