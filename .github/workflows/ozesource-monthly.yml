name: Run ozesource monthly

on:
  workflow_dispatch:
  schedule:
    - cron: "15 10 10 10 *"

permissions:
  contents: write

jobs:
  ozesource:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("jsonlite","dplyr","readr","tibble"), repos="https://cloud.r-project.org")'

      - name: Run ozesource script
        run: |
          Rscript ozesource-monthly-simple.R

      - name: Commit and push ozesource.csv
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ozesource.csv
          git diff --cached --quiet && echo "No changes to commit." && exit 0
          git commit -m "Update ozesource.csv"
          git push origin HEAD:$BRANCH_NAME

      - name: Upload ozesource.csv
        uses: actions/upload-artifact@v4
        with:
          name: ozesource-csv
          path: ozesource.csv
          if-no-files-found: error
