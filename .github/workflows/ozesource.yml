name: Run ozesource

on:
  workflow_dispatch:
  schedule:
    - cron: "15 4 * * *"

jobs:
  ozesource:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("jsonlite","dplyr","purrr","stringr","tidyr","readr","tibble"), repos="https://cloud.r-project.org")'

      - name: Run ozesource script
        run: |
          Rscript ozesource.R

      - name: Upload ozesource.csv
        uses: actions/upload-artifact@v4
        with:
          name: ozesource-csv
          path: ozesource.csv
          if-no-files-found: error
