<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OZE Source – měsíční přehled</title>

  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body { font-family: Arial; margin: 20px; }
    .filters { display:flex; gap:15px; margin-bottom:20px; }
    .charts { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    @media (max-width:1000px){ .charts { grid-template-columns:1fr; } }
  </style>
</head>

<body>

<h2>OZE Source – průměrné hodnoty</h2>

<div class="filters">
  <div>
    <label>Stanice</label><br>
    <select id="stationFilter"></select>
  </div>
  <div>
    <label>Rok</label><br>
    <select id="yearFilter"></select>
  </div>
  <div>
    <label>Měsíc</label><br>
    <select id="monthFilter"></select>
  </div>
</div>

<div class="charts">
  <div id="chartF"></div>
  <div id="chartSSV"></div>
</div>

<script>
const CSV_FILE = "ozesource.csv";

let records = [];
let allTimes = [];

function normalize(row){
  return {
    STATION: row.STATION,
    YEAR: Number(row.YEAR),
    MONTH: Number(row.MONTH),
    TIME: row.TIME,
    ELEMENT: row.ELEMENT,
    AVG: Number(row.AVG)
  };
}

function unique(arr){
  return [...new Set(arr)];
}

function fill(id, values){
  const el = document.getElementById(id);
  el.innerHTML = "";
  values.forEach(v=>{
    const o=document.createElement("option");
    o.value=v;
    o.textContent=v;
    el.appendChild(o);
  });
}

function plot(element, target){
  const s = document.getElementById("stationFilter").value;
  const y = Number(document.getElementById("yearFilter").value);
  const m = Number(document.getElementById("monthFilter").value);

  const data = records.filter(r =>
    r.STATION===s &&
    r.YEAR===y &&
    r.MONTH===m &&
    r.ELEMENT===element
  );

  const map = new Map();
  data.forEach(r=> map.set(r.TIME, r.AVG));

  const yvals = allTimes.map(t => map.get(t) ?? null);

  Plotly.newPlot(target, [{
    x: allTimes,
    y: yvals,
    mode: "lines+markers",
    type: "scatter"
  }], {
    title: element,
    xaxis:{ title:"TIME", tickangle:-45 },
    yaxis:{ title:"AVG" }
  });
}

function render(){
  plot("F","chartF");
  plot("SSV10M","chartSSV");
}

function init(){
  const stations = unique(records.map(r=>r.STATION)).sort();
  const years = unique(records.map(r=>r.YEAR)).sort();
  const months = unique(records.map(r=>r.MONTH)).sort();

  allTimes = unique(records.map(r=>r.TIME))
    .sort((a,b)=>{
      const [h1]=a.split(":");
      const [h2]=b.split(":");
      return h1-h2;
    });

  fill("stationFilter",stations);
  fill("yearFilter",years);
  fill("monthFilter",months);

  document.getElementById("stationFilter").onchange=render;
  document.getElementById("yearFilter").onchange=render;
  document.getElementById("monthFilter").onchange=render;

  render();
}

Papa.parse(CSV_FILE,{
  download:true,
  header:true,
  complete:(res)=>{
    records = res.data.map(normalize)
      .filter(r=>r.TIME && !isNaN(r.AVG));
    init();
  }
});
</script>

</body>
</html>
