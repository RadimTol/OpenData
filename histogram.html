<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Histogramy hodnot</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --chmi-blue: #005aa3;
      --chmi-blue-light: #0b77c5;
      --chmi-bg: #f4f7fb;
      --card-bg: #ffffff;
      --text: #1e2a36;
      --muted: #5e6b78;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.10);
      --radius: 16px;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--chmi-bg);
      color: var(--text);
    }

    .page {
      max-width: 1700px;
      margin: 0 auto;
      padding: 24px;
    }

    .top-bar {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-bottom: 18px;
    }

    .nav-btn {
      background: var(--chmi-blue);
      color: #fff;
      padding: 10px 16px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    .hero {
      background: linear-gradient(135deg, var(--chmi-blue), var(--chmi-blue-light));
      color: white;
      border-radius: 20px;
      padding: 28px;
      box-shadow: var(--shadow);
      margin-bottom: 22px;
    }

    .group {
      margin-bottom: 30px;
    }

    .group-header {
      background: white;
      border-left: 6px solid var(--chmi-blue);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .panel {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel-head {
      padding: 12px;
      background: #eaf3fb;
      border-bottom: 1px solid #dbeaf8;
    }

    .panel-body {
      padding: 12px;
    }

    .chart-wrap {
      height: 240px;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="page">

    <div class="top-bar">
      <a href="index.html" class="nav-btn">← Back</a>
      <button onclick="location.reload()" class="nav-btn">🔄 Refresh</button>
    </div>

    <div class="hero">
      <h1>Histogramy hodnot</h1>
    </div>

    <!-- DNES -->
    <section class="group">
      <div class="group-header">
        <h2 id="titleNow">Histogram hodnot dnes</h2>
      </div>
      <div class="grid" id="gridNow"></div>
    </section>

    <!-- VČERA -->
    <section class="group">
      <div class="group-header">
        <h2 id="titleRecent">Histogram hodnot včera</h2>
      </div>
      <div class="grid" id="gridRecent"></div>
    </section>

  </div>

<script>
const elementInfo = {
  T: "Teplota",
  Fmax: "Maximální náraz větru",
  SRA: "Srážky",
  SRA1H: "Srážky 1h"
};

const elementUnits = {
  T: "°C",
  Fmax: "m/s",
  SRA: "mm",
  SRA1H: "mm"
};

function parseCsv(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = lines[0].split(",");
  return lines.slice(1).map(line => {
    const cols = line.split(",");
    let obj = {};
    headers.forEach((h,i)=> obj[h]=cols[i]);
    return obj;
  });
}

function latestTime(rows){
  const arr = rows.map(r=>r.run_datetime_local).filter(Boolean);
  arr.sort();
  return arr[arr.length-1];
}

function formatDate(s){
  const d = new Date(s.replace(" ","T"));
  return d.toLocaleString("cs-CZ",{day:"numeric",month:"numeric",year:"numeric",hour:"2-digit",minute:"2-digit"});
}

function buildData(rows, element){
  return rows
    .filter(r=>r.element===element)
    .map(r=>({
      left: Number(r.bin_left),
      right: Number(r.bin_right),
      count: Number(r.count)
    }))
    .sort((a,b)=>a.left-b.left);
}

function drawChart(id, element, data){
  new Chart(document.getElementById(id),{
    type:"bar",
    data:{
      labels:data.map(d=>`${d.left}-${d.right}`),
      datasets:[{data:data.map(d=>d.count)}]
    },
    options:{
      responsive:true,
      plugins:{legend:{display:false}},
      scales:{
        x:{title:{display:true,text:elementUnits[element]}},
        y:{beginAtZero:true}
      }
    }
  });
}

function renderGroup(rows, gridId, titleId, title, elements){
  const grid = document.getElementById(gridId);
  grid.innerHTML = "";

  const dt = latestTime(rows);
  if(dt){
    document.getElementById(titleId).textContent =
      `${title} (data ${formatDate(dt)})`;
  }

  elements.forEach(el=>{
    const data = buildData(rows, el);

    const panel = document.createElement("div");
    panel.className = "panel";

    panel.innerHTML = `
      <div class="panel-head"><b>${el}</b></div>
      <div class="panel-body">
        <div class="chart-wrap">
          <canvas id="${gridId}_${el}"></canvas>
        </div>
      </div>
    `;

    grid.appendChild(panel);

    if(data.length){
      drawChart(`${gridId}_${el}`, el, data);
    }
  });
}

async function load(){
  const [now, recent] = await Promise.all([
    fetch("histnow.csv").then(r=>r.text()).then(parseCsv),
    fetch("histrecent.csv").then(r=>r.text()).then(parseCsv)
  ]);

  renderGroup(now,"gridNow","titleNow","Histogram hodnot dnes",
    ["T","Fmax","SRA1H"]);

  renderGroup(recent,"gridRecent","titleRecent","Histogram hodnot včera",
    ["T","Fmax","SRA"]);
}

load();
</script>

</body>
</html>
