<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Histogramy hodnot</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --chmi-blue: #005aa3;
      --chmi-blue-light: #0b77c5;
      --chmi-bg: #f4f7fb;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--chmi-bg);
    }

    .page {
      max-width: 1700px;
      margin: 0 auto;
      padding: 24px;
    }

    .top-bar {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-bottom: 18px;
    }

    .nav-btn {
      background: var(--chmi-blue);
      color: white;
      padding: 10px 16px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    .hero {
      background: linear-gradient(135deg, var(--chmi-blue), var(--chmi-blue-light));
      color: white;
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 22px;
    }

    .group {
      margin-bottom: 30px;
    }

    .group-header {
      background: white;
      border-left: 6px solid var(--chmi-blue);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .panel {
      background: white;
      border-radius: 12px;
      padding: 10px;
    }

    .chart-wrap {
      height: 240px;
    }
  </style>
</head>

<body>
<div class="page">

<div class="top-bar">
  <a href="index.html" class="nav-btn">← Back</a>
  <button onclick="location.reload()" class="nav-btn">🔄 Refresh</button>
</div>

<div class="hero">
  <h1 id="mainTitle">Histogramy hodnot</h1>
</div>

<section class="group">
  <div class="group-header">
    <h2 id="titleNow">Histogram hodnot dnes</h2>
  </div>
  <div class="grid" id="gridNow"></div>
</section>

<section class="group">
  <div class="group-header">
    <h2 id="titleRecent">Histogram hodnot včera</h2>
  </div>
  <div class="grid" id="gridRecent"></div>
</section>

</div>

<script>
function parseCsv(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = lines[0].replace(/"/g,"").split(",");

  return lines.slice(1).map(line=>{
    const cols = line.replace(/"/g,"").split(",");
    let obj = {};
    headers.forEach((h,i)=>obj[h]=cols[i]);
    return obj;
  });
}

function parseDate(s){
  if(!s) return null;
  return new Date(s.replace(" ","T"));
}

function fmt(dt){
  if(!dt) return "";
  return dt.toLocaleString("cs-CZ");
}

function latest(arr){
  return arr.sort((a,b)=>parseDate(a)-parseDate(b)).pop();
}

function build(rows, el){
  return rows.filter(r=>r.element===el)
    .map(r=>({
      l:+r.bin_left,
      r:+r.bin_right,
      c:+r.count
    }))
    .sort((a,b)=>a.l-b.l);
}

function chart(id,data){
  new Chart(document.getElementById(id),{
    type:"bar",
    data:{
      labels:data.map(d=>`${d.l}-${d.r}`),
      datasets:[{data:data.map(d=>d.c)}]
    },
    options:{plugins:{legend:{display:false}}}
  });
}

function render(rows, gridId, elements){
  const grid=document.getElementById(gridId);
  grid.innerHTML="";

  elements.forEach(el=>{
    const d=build(rows,el);

    const div=document.createElement("div");
    div.className="panel";
    div.innerHTML=`<canvas id="${gridId}_${el}"></canvas>`;
    grid.appendChild(div);

    if(d.length) chart(`${gridId}_${el}`,d);
  });
}

async function load(){
  const now=await fetch("histnow.csv").then(r=>r.text()).then(parseCsv);
  const rec=await fetch("histrecent.csv").then(r=>r.text()).then(parseCsv);

  // hlavní čas
  const mainTime = latest([
    ...now.map(r=>r.run_datetime_local),
    ...rec.map(r=>r.run_datetime_local)
  ]);

  document.getElementById("mainTitle").textContent =
    `Histogramy hodnot (připraveno: ${fmt(parseDate(mainTime))})`;

  // dnes
  const nowTime = latest(now.map(r=>r.value_datetime_utc));
  document.getElementById("titleNow").textContent =
    `Histogram hodnot dnes (${fmt(parseDate(nowTime))})`;

  // včera
  const recTime = latest(rec.map(r=>r.value_date));
  document.getElementById("titleRecent").textContent =
    `Histogram hodnot včera (${recTime})`;

  render(now,"gridNow",["T","Fmax","SRA1H"]);
  render(rec,"gridRecent",["T","Fmax","SRA"]);
}

load();
</script>

</body>
</html>
