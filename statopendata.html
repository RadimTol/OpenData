<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Počet souborů podle dne a adresáře</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 24px;
  background: #f7f7f7;
  color: #222;
}

.top-bar {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 10px;
}

.back-btn {
  background: #005aa3;
  color: white;
  padding: 8px 14px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: bold;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.back-btn:hover {
  background: #0b77c5;
}

.top-layout {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  align-items: stretch;
}

.left-panel {
  flex: 1 1 55%;
  min-width: 480px;
  display: flex;
  align-items: center;
}

.right-panel {
  flex: 1 1 40%;
  min-width: 320px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.card, .pie-card {
  background: white;
  border-radius: 10px;
  padding: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  width: 100%;
}

.pie-card h2 {
  font-size: 14px;
  margin-bottom: 8px;
}

.pie-wrap {
  height: 200px;
  position: relative;
}

.small {
  font-size: 0.9em;
  color: #666;
}

table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 20px;
}

th, td {
  border-bottom: 1px solid #ddd;
  padding: 8px;
}

th {
  background: #eef3f8;
}

@media (max-width: 900px) {
  .left-panel {
    min-width: 100%;
    display: block;
  }

  .right-panel {
    min-width: 100%;
  }
}

@media (max-width: 600px) {
  .right-panel {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="top-bar">
  <a href="index.html" class="back-btn">← Back</a>
</div>

<h1>Počet souborů podle dne a adresáře</h1>
<div id="status">Načítám…</div>
<div class="small" id="lastUpdate"></div>

<div class="top-layout">

  <div class="left-panel">
    <div class="card">
      <canvas id="chart"></canvas>
    </div>
  </div>

  <div class="right-panel" id="piePanel"></div>

</div>

<div class="card">
  <table>
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
function formatDateCZ(d) {
  return new Date(d).toLocaleDateString("cs-CZ");
}

function formatMonthCZ(d) {
  const dt = new Date(d);
  return dt.toLocaleDateString("cs-CZ", {
    month: "2-digit",
    year: "numeric"
  });
}

function formatLocalTimestamp(utcText) {
  const date = new Date(utcText.replace(" UTC", "Z"));
  return date.toLocaleString("cs-CZ", { timeZone: "Europe/Prague" });
}

function hourLabel(h) {
  return String(h).padStart(2, "0") + ":00";
}

function pieColors(values) {
  const palette = [
    "#3366CC","#DC3912","#FF9900","#109618","#990099","#0099C6",
    "#DD4477","#66AA00","#B82E2E","#316395","#994499","#22AA99",
    "#AAAA11","#6633CC","#E67300","#8B0707","#651067","#329262",
    "#5574A6","#3B3EAC","#B77322","#16D620","#B91383","#F4359E"
  ];
  return values.map((v, i) => v > 0 ? palette[i] : "#e6e6e6");
}

async function loadData() {
  const status = document.getElementById("status");
  const piePanel = document.getElementById("piePanel");

  try {
    const data = await (await fetch("data.json")).json();
    const nowHourly = await (await fetch("now_hourly.json")).json();
    const lastRun = await fetch("last_run.txt").then(r => r.text()).catch(() => null);

    if (lastRun) {
      document.getElementById("lastUpdate").innerText =
        "Poslední aktualizace: " + formatLocalTimestamp(lastRun.trim());
    } else {
      document.getElementById("lastUpdate").innerText =
        "Poslední aktualizace: není k dispozici";
    }

    const dates = [...new Set(data.map(d => d.date))].sort();
    const sources = [...new Set(data.map(d => d.source))];
    const labels = dates.map(formatDateCZ);

    const colors = {
      now: "steelblue",
      "1hour": "orange",
      "10min": "green",
      daily: "red",
      phenomena: "purple"
    };

    const datasets = sources.map(s => ({
      label: s,
      backgroundColor: colors[s] || "gray",
      data: dates.map(d => {
        const r = data.find(x => x.date === d && x.source === s);
        return r ? r.n_files : 0;
      })
    }));

    new Chart(document.getElementById("chart"), {
      type: "bar",
      data: { labels, datasets },
      options: {
        responsive: true,
        plugins: {
          legend: {
            position: "top"
          }
        }
      }
    });

    piePanel.innerHTML = "";

    // 3 koláče NOW
    const nowDays = [...new Set(nowHourly.map(d => d.day))].sort();

    nowDays.forEach((day, i) => {
      const values = Array.from({ length: 24 }, (_, h) => {
        const r = nowHourly.find(x => x.day === day && Number(x.hour) === h);
        return r ? r.n_files : 0;
      });

      const div = document.createElement("div");
      div.className = "pie-card";
      div.innerHTML = `
        <h2>now ${formatDateCZ(day)}</h2>
        <div class="pie-wrap"><canvas id="p${i}"></canvas></div>
      `;
      piePanel.appendChild(div);

      new Chart(document.getElementById(`p${i}`), {
        type: "pie",
        data: {
          labels: Array.from({ length: 24 }, (_, h) => hourLabel(h)),
          datasets: [{
            data: values,
            backgroundColor: pieColors(values)
          }]
        },
        options: {
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (c) => c.raw === 0 ? null : `${c.label}: ${c.raw}`
              }
            }
          }
        }
      });
    });

    // 4. koláč: daily vs phenomena za poslední dostupný měsíc
    const monthlyRows = data.filter(d =>
      d.source === "daily" || d.source === "phenomena"
    );

    monthlyRows.sort((a, b) => a.date.localeCompare(b.date));

    const lastMonthlyDate = monthlyRows.length > 0
      ? monthlyRows[monthlyRows.length - 1].date
      : null;

    const dailyVal = lastMonthlyDate
      ? (data.find(d => d.date === lastMonthlyDate && d.source === "daily")?.n_files || 0)
      : 0;

    const phenVal = lastMonthlyDate
      ? (data.find(d => d.date === lastMonthlyDate && d.source === "phenomena")?.n_files || 0)
      : 0;

    const div = document.createElement("div");
    div.className = "pie-card";
    div.innerHTML = `
      <h2>Daily vs Phenomena – ${lastMonthlyDate ? formatMonthCZ(lastMonthlyDate) : "není k dispozici"}</h2>
      <div class="pie-wrap"><canvas id="pieDP"></canvas></div>
    `;
    piePanel.appendChild(div);

    new Chart(document.getElementById("pieDP"), {
      type: "pie",
      data: {
        labels: ["daily", "phenomena"],
        datasets: [{
          data: [dailyVal, phenVal],
          backgroundColor: [colors.daily, colors.phenomena]
        }]
      },
      options: {
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: (c) => c.raw === 0 ? null : `${c.label}: ${c.raw}`
            }
          }
        }
      }
    });

    // Tabulka dole
    let head = "<tr><th>Datum</th>";
    sources.forEach(s => head += `<th>${s}</th>`);
    head += "</tr>";
    document.getElementById("tableHead").innerHTML = head;

    let body = "";
    dates.forEach(d => {
      body += `<tr><td>${formatDateCZ(d)}</td>`;
      sources.forEach(s => {
        const r = data.find(x => x.date === d && x.source === s);
        body += `<td>${r ? r.n_files : 0}</td>`;
      });
      body += "</tr>";
    });
    document.getElementById("tableBody").innerHTML = body;

    status.innerText = "OK";

  } catch (e) {
    status.innerText = "Chyba: " + e.message;
    console.error(e);
  }
}

loadData();
</script>

</body>
</html>
