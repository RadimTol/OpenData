name: Update data.json

on:
  schedule:
    - cron: "15 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: |
          Rscript -e "install.packages(c('stringr','dplyr','lubridate','jsonlite'), repos='https://cloud.r-project.org')"

      - name: Run update script
        run: Rscript update_data.R

      - name: Write last run timestamp
        run: |
          date -u +"%Y-%m-%d %H:%M:%S UTC" > last_run.txt
          echo "Obsah last_run.txt:"
          cat last_run.txt

      - name: Debug git status
        run: |
          echo "Aktuální adresář:"
          pwd
          echo "Soubory:"
          ls -la
          echo "Git status před add:"
          git status --short

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          echo "Git status po add:"
          git status --short

          git commit -m "Automatická aktualizace dat" || echo "Nothing to commit"
          git push
